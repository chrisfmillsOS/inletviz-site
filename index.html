<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InletViz — Saanich Inlet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafb;
      color: #1a2530;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1rem;
      color: #6b8090;
      margin-bottom: 2.5rem;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      justify-content: center;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #0080a0;
      color: #fff;
    }
    .btn-secondary {
      background: #fff;
      color: #0080a0;
      border: 1.5px solid #0080a0;
    }
    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.72rem;
      color: #8aa0b0;
    }
  </style>
</head>
<body>
  <main>
    <h1>InletViz</h1>
    <p class="tagline">Saanich Inlet water visibility &amp; conditions</p>
    <div class="btn-row">
      <a class="btn btn-primary" href="/models/">View visibility data</a>
      <a class="btn btn-secondary" href="/submit/">Submit a measurement</a>
    </div>
  </main>
  <footer>Saanich Inlet, British Columbia</footer>
</body>
</html>
